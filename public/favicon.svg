<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" />

  <!-- Q Letter -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">Q</text>

  <!-- Sparkle Effect -->
  <circle cx="75" cy="25" r="3" fill="#FCD34D" opacity="0.9"/>
  <circle cx="82" cy="30" r="2" fill="#FCD34D" opacity="0.7"/>
  <circle cx="70" cy="32" r="2" fill="#FCD34D" opacity="0.7"/>
</svg>
